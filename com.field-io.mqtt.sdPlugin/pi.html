<head>
    <meta charset="utf-8" />
    <title>MQTT Dial</title>
    <link rel="stylesheet" href="sdpi.css">
    <script src="common.js"></script>
</head>

<body>
<div class="sdpi-wrapper">

    <div class="sdpi-heading">Dial Settings</div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Min</div>
        <input class="sdpi-item-value" id="min" placeholder="0">
    </div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Max</div>
        <input class="sdpi-item-value" id="max" placeholder="100">
    </div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Step Size</div>
        <input class="sdpi-item-value" id="stepSize" placeholder="1">
    </div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Wrap</div>
        <select class="sdpi-item-value" id="wrap">
            <option value="false">No</option>
            <option value="true">Yes</option>
        </select>
    </div>

    <div class="sdpi-heading">MQTT</div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Broker</div>
        <input class="sdpi-item-value" id="valBroker" placeholder="Host/IP">
    </div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Port</div>
        <input class="sdpi-item-value" id="valPort" placeholder="1883">
    </div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Username</div>
        <input class="sdpi-item-value" id="valUsername">
    </div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Password</div>
        <input class="sdpi-item-value" id="valPassword">
    </div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">SSL</div>
        <select class="sdpi-item-value" id="valSsl">
            <option value="false">No</option>
            <option value="true">Yes</option>
        </select>
    </div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Client ID</div>
        <input class="sdpi-item-value" id="valClientId">
    </div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Topic</div>
        <input class="sdpi-item-value" id="valTopic">
    </div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Message</div>
        <input class="sdpi-item-value" id="valMessage" placeholder="Json Example: {&quot;dial&quot;: {{value}}}">
    </div>

    <div class="sdpi-item">
        <div class="sdpi-item-label">Retain</div>
        <select class="sdpi-item-value" id="valRetain">
            <option value="false">No</option>
            <option value="true">Yes</option>
        </select>
    </div>

    <div class="sdpi-item">
        <button class="sdpi-item-value" onclick="save()">Save</button>
    </div>

</div>

<script>
    if ($SD) {
        $SD.on('connected', json => {
            const s = Utils.getProp(json, 'actionInfo.payload.settings', {});
            document.querySelectorAll(".sdpi-item-value").forEach(el => {
                if (s[el.id] !== undefined) el.value = s[el.id];
            });
        });
    }

    function save() {
        const payload = {};
        document.querySelectorAll(".sdpi-item-value").forEach(el => {
            payload[el.id] = el.value;
        });
        $SD.api.sendToPlugin($SD.uuid, $SD.actionInfo.action, payload);
    }
</script>

</body>
